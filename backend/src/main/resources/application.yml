server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: admin-scaffold
  datasource:
    url: jdbc:h2:mem:admindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  # ⚠️  Change this secret in production!
  secret: AdminScaffoldJwtSecretKey2024ChangeThisInProductionEnvironment2024
  expiration: 86400000  # 24 hours in milliseconds

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tags-sorter: alpha

logging:
  level:
    com.admin: DEBUG
    org.springframework.security: WARN
